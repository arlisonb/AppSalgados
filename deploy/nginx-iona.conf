# Proxy reverso — Iona Salgados (app Android)
# Copie para /etc/nginx/sites-available/iona e ative com certbot.
#
# DNS necessário:
#   iona.meuappagenda.com.br  A  185.209.228.10
#
# SSL: certbot --nginx -d iona.meuappagenda.com.br

server {
    listen 80;
    server_name iona.meuappagenda.com.br;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name iona.meuappagenda.com.br;

    # Certbot preenche estes caminhos:
    # ssl_certificate /etc/letsencrypt/live/iona.meuappagenda.com.br/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/iona.meuappagenda.com.br/privkey.pem;

    client_max_body_size 15m;

    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
